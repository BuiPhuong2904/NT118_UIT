<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Be+Vietnam+Pro:wght@400;500&family=Chakra+Petch:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Chakra Petch', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f3c6f5, #f7a8d9, #ffd6ec);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(25px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 360px;
      background: #FFFFFF;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      color: #6d3194;
      font-size: 18px;
      margin-bottom: 5px;
    }

    .greeting-icon {
      margin-left: 6px;
      display: inline-flex;
      vertical-align: middle;
    }

    .greeting-icon svg {
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%,100% {opacity:1;}
      50% {opacity:0.5;}
    }

    p {
      font-family: 'Be Vietnam Pro', sans-serif;
      color: #8293b4;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .input-group {
      position: relative;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px;
      padding-right: 45px;
      border: 1px solid #eee;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #ff8adf;
      box-shadow: 0 0 5px rgba(255,138,223,0.5);
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .hidden { display: none; }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff6fd8, #00b2e6);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #e93397, #009ecc);
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
      color: #e93397;
      min-height: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo_notext_nobg_1.png" class="logo">

    <h2 id="greeting-text">
      Xin chào...
      <span class="greeting-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#ff6fd8" viewBox="0 0 24 24">
          <path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z"/>
        </svg>
      </span>
    </h2>

    <p>Hãy nhập mật khẩu mới của bạn</p>

    <form id="resetForm">

      <div class="input-group">
        <input type="password" id="newPassword" placeholder="Mật khẩu mới" required>

        <span class="toggle" onclick="togglePassword('newPassword', this)">
          <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6d3194" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6d3194" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 1l22 22"/>
          </svg>
        </span>
      </div>

      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>

        <span class="toggle" onclick="togglePassword('confirmPassword', this)">
          <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6d3194" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6d3194" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 1l22 22"/>
          </svg>
        </span>
      </div>

      <button type="submit">Đặt lại mật khẩu</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    fetch(`/api/auth/get-user-by-token?token=${token}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("greeting-text").innerHTML =
          data.username ? `Xin chào ${data.username}` : "Token không hợp lệ";
      });

    function togglePassword(id, el) {
      const input = document.getElementById(id);
      const eye = el.querySelector(".icon-eye");
      const eyeOff = el.querySelector(".icon-eye-off");

      if (input.type === "password") {
        input.type = "text";
        eye.classList.add("hidden");
        eyeOff.classList.remove("hidden");
      } else {
        input.type = "password";
        eye.classList.remove("hidden");
        eyeOff.classList.add("hidden");
      }
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword !== confirmPassword) {
        document.getElementById("message").innerText = "Mật khẩu không khớp!";
        return;
      }

      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();
      document.getElementById("message").innerText = data.message;
    });
  </script>

</body>
</html>
